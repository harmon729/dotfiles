# Enable 256 color and true color support in tmux
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# General
set -s set-clipboard on
set -g mouse on
set -g status-interval 3
set -g detach-on-destroy off
set -g escape-time 0
set -g focus-events on

# Set PREFIX-KEY
set -g prefix C-Space
unbind C-b
bind Space send-prefix

# Refresh tmux config with r
unbind r
bind r source-file ~/.tmux.conf

# Split horizontally in CWD with "\"
unbind %
bind \\ split-window -h -c "#{pane_current_path}"

# Split vertically in CWD with "-"
unbind \"
bind - split-window -v -c "#{pane_current_path}"

# New window in same path
bind c new-window -c "#{pane_current_path}"

# Use vim arrow keys to resize
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Cycle pane quickly
unbind C-Space
bind C-Space select-pane -t :.+

# Use vim movements
setw -g mode-keys vi

# Start selecting text with "v"
bind -T copy-mode-vi 'v' send -X begin-selection

# Copy text with "y"
bind -T copy-mode-vi 'y' send -X copy-pipe "umask 077; cat > ~/clip.buf"

# Copy text with "Enter"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "umask 077; cat > ~/clip.buf"

# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
