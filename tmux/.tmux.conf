# Enable 256 color and true color support in tmux
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# General
set -s set-clipboard on
set -g mouse on
set -g status-interval 3
set -g detach-on-destroy off
set -g escape-time 0
set -g focus-events on
set -g history-limit 50000

# Set PREFIX-KEY
set -g prefix C-Space
unbind C-b
bind Space send-prefix

# Refresh tmux config with r
unbind r
bind r source-file ~/.tmux.conf

# Split horizontally in CWD with "\"
unbind %
bind \\ split-window -h -c "#{pane_current_path}"

# Split vertically in CWD with "-"
unbind \"
bind - split-window -v -c "#{pane_current_path}"

# New window in same path
bind c new-window -c "#{pane_current_path}"

# Use vim arrow keys to resize
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Cycle pane quickly
unbind C-Space
bind C-Space select-pane -t :.+

# Use vim movements
setw -g mode-keys vi

# Start selecting text with "v"
bind -T copy-mode-vi 'v' send -X begin-selection

# Copy text with "y"
bind -T copy-mode-vi 'y' send -X copy-pipe "umask 077; cat > ~/clip.buf"

# Copy text with "Enter"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "umask 077; cat > ~/clip.buf"

# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @resurrect-capture-pane-contents 'on'

# Style
set -g @gray_light "#D8DEE9"
set -g @gray_medium "#ABB2BF"
set -g @gray_dark "#3B4252"
set -g @green_soft "#A3BE8C"
set -g @yellow_soft "#EBCB8B"
set -g @red_soft "#BD616A"
set -g @blue_muted "#81A1C1"
set -g @cyan_soft "#88C0D0"

set -g status-position top
set -g status-right-length 100
set -g status-left-length 100
set -g status-style "fg=#{@gray_light}"
set -g status-left "#[fg=#{@green_soft},bold]  #S #[fg=#{@gray_light},nobold]  "
set -g window-status-current-format "#[fg=#{@cyan_soft},bold] #[underscore]#I:#W"
set -g window-status-format " #I:#W"
set -g @cpu_low_fg_color "#[fg=#{@green_soft}]"
set -g @cpu_medium_fg_color "#[fg=#{@yellow_soft}]"
set -g @cpu_high_fg_color "#[fg=#{@red_soft}]"
set -g @ram_low_fg_color "#[fg=#{@green_soft}]"
set -g @ram_medium_fg_color "#[fg=#{@yellow_soft}]"
set -g @ram_high_fg_color "#[fg=#{@red_soft}]"
set -g status-right "#{cpu_fg_color}  #{cpu_percentage} #[fg=#{@gray_light}]"
set -ag status-right "#{ram_fg_color}  #{ram_percentage} #[fg=#{@gray_light} ]"
set -g message-style "fg=#{@gray_light}"
set -g mode-style "fg=#{@gray_dark},bg=#{@blue_muted}"
set -g pane-border-style "fg=#{@gray_dark}"
set -g pane-active-border-style "fg=#{@gray_medium}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
