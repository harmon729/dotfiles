# ~/.config/starship.toml

format = """
[┌](bold dark_blue) \
${custom.origin}\
$directory\
$git_branch\
$git_status\
$fill\
$cmd_duration\
$jobs\
$pixi\
$python\
$lua\
$docker_context\
$time\
$line_break\
[└─](bold dark_blue)\
$character
"""

add_newline = true
palette = "nord"

[custom.origin]
command = "echo $CUSTOM_ORIGIN_SYMBOL"
when = 'test -n "$CUSTOM_ORIGIN_SYMBOL"'
style = "bold fg:teal"
format = "[$output ]($style)"

[directory]
style = 'bold fg:teal'
format = "[$path ]($style)"
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '󰈙'
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '

[git_branch]
style = 'fg:green'
symbol = ' '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:green'
format = '([$all_status$ahead_behind ]($style))'

[fill]
symbol = ' '

[pixi]
style = 'yellow'
symbol = ' '
detect_files = ['pixi.toml', 'pyproject.toml']
detect_folders = []
show_default_environment = true
format = '[$symbol($environment )]($style)'

[python]
style = 'blue'
symbol = ' '
format = '[${symbol}(${version} )(\($virtualenv\) )]($style)'

[lua]
format = '[$symbol($version )]($style)'
symbol = ' '

[nodejs]
style = 'blue'
symbol = ' '

[golang]
style = 'blue'
symbol = ' '

[haskell]
style = 'blue'
symbol = ' '

[rust]
style = 'orange'
symbol = ' '

[ruby]
style = 'blue'
symbol = ' '

[package]
symbol = '󰏗 '

[docker_context]
symbol = ' '
style = 'fg:#06969A'
format = '[$symbol($context )]($style)'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = ' '
style = 'orange'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 1000
style = 'fg:gray'
format = '[$duration]($style) '

[time]
disabled = false
time_format = "%R"
style = "fg:blue"
format = '[ $time]($style)'

[character]
success_symbol = '[❯](bold fg:blue)'
error_symbol = '[❯](bold fg:yellow)'

[palettes.nord]
dark_blue = '#5E81AC'
blue = '#81A1C1'
teal = '#88C0D0'
red = '#BF616A'
orange = '#D08770'
green = '#A3BE8C'
yellow = '#EBCB8B'
purple = '#B48EAD'
gray = '#434C5E'
black = '#2E3440'
white='#D8DEE9'

[palettes.onedark]
dark_blue='#61afef'
blue='#56b6c2'
red='#e06c75'
green='#98c379'
purple='#c678dd'
cyan='#56b6c2'
orange='#be5046'
yellow='#e5c07b'
gray='#828997'
white ='#abb2bf'
black='#2c323c'
